services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: notebook
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: ["mongod", "--auth"]
    container_name: db
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    restart: unless-stopped

volumes:
  mongo_data:
