services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: notebook
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: db
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
