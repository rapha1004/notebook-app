services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: notebook
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    restart: unless-stopped
    develop:
      watch:
        - action: restart
          path: .
          #target: /app
          ignore:
            - node_modules
            - .next
            - dist
            - out
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    container_name: db
    environment:
      NODE_ENV: development
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: